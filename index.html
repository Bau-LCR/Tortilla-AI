<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cut-real AI Wallpaper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background star canvas (layer 1) -->
  <canvas id="stars"></canvas>

  <!-- Node connections + CSS particles (layer 2) -->
  <div id="particles"></div>

  <!-- Orb bottom-right (layer 3) -->
  <div class="orb-wrapper">
    <div class="orb-frame">
      <div class="orb-outer-glow"></div>
      <div class="orb-ring ring-a"></div>
      <div class="orb-ring ring-b"></div>
      <div class="orb-sphere">
        <div class="orb-highlight"></div>
        <div class="orb-atmosphere"></div>
        <div class="orb-shimmer"></div>
      </div>
    </div>
    <span class="orb-label">CUT-REAL AI</span>
  </div>

  <script src="main.js"></script>
  <script src="particles.js"></script>
</body>
</html>
