<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cut-real AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash-screen">
    <img src="Logo1.png" alt="Logo Splash" class="splash-logo">
</div>

<header class="main-header">
    <a href="#" class="header-logo">
        <img src="Logo1.png" alt="Logo" class="nav-logo-small">
        <h2 class="nav-title">Cut-real <span class="red-text">AI</span></h2>
    </a>
</header>

<div id="particles"></div>

<div class="side-controls">
    <button id="logout-btn" onclick="logout()" style="display:none;">Cerrar Sesión</button>
    <button id="resetChat" onclick="resetChat()" style="display:none;">Borrar Chat</button>
</div>

<div id="login-overlay">
    <div class="auth-card">
        <img src="Logo1.png" alt="Login Logo" class="auth-logo-small">
        <h2>Cut-real AI</h2>
        <p>Inicia sesión para sincronizar tus chats</p>
        <button onclick="login()" class="google-btn">
            <img src="google.png" alt="Google">
            Entrar con Google
        </button>
    </div>
</div>

<main id="chat-container">
    <div id="chat">
        <div class="ai">Hola, soy Cut-real AI.</div>
    </div>

    <div class="input-area">
        <input id="input" placeholder="Escribe un mensaje..." autocomplete="off">
        <button onclick="sendMessage()" id="send-btn">Enviar</button>
    </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCQVU9rcF41NL1j6S30SNEMzF9VxBknNEI",
    authDomain: "cutreal-ai.firebaseapp.com",
    projectId: "cutreal-ai",
    storageBucket: "cutreal-ai.firebasestorage.app",
    messagingSenderId: "79541553692",
    appId: "1:79541553692:web:388068da209f1b4ac9edd9"
  };

  const app = initializeApp(firebaseConfig);
  window.auth = getAuth(app);
  window.db = getFirestore(app);
  window.provider = new GoogleAuthProvider();
  window.firestore = { doc, getDoc, setDoc };
</script>

<script src="particles.js"></script>
<script src="main.js"></script>

</body>
</html>
