<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cut-real AI | Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash-screen">
    <img src="Logo1.png" alt="Logo" class="splash-logo">
</div>

<div id="particles"></div>

<header class="main-header">
    <div class="header-logo">
        <img src="Logo1.png" alt="Logo" class="nav-logo-small">
        <h2 class="nav-title">Cut-real <span class="red-text">AI</span></h2>
    </div>
</header>

<div id="login-overlay">
    <div class="auth-card">
        <img src="Logo1.png" alt="Logo" class="auth-logo-small">
        <h2>Bienvenido</h2>
        <button onclick="login()" class="google-btn">Entrar con Google</button>
    </div>
</div>

<div class="side-controls">
    <button id="logout-btn" onclick="logout()" style="display:none;">Salir</button>
    <button id="resetChat" onclick="resetChat()" style="display:none;">Limpiar</button>
    <button id="admin-btn" onclick="openAdmin()" style="display:none;">ADMIN</button>
</div>

<main id="chat-container">
    <div id="chat">
        <div class="ai">Hola, soy <b>Cut-real AI</b>. ¿En qué puedo ayudarte hoy?</div>
    </div>
</main>

<div class="input-area">
    <div class="input-wrapper">
        <input type="file" id="file-input" hidden accept=".pdf,.docx">
        <button id="attach-btn" title="Adjuntar PDF o Word">📎</button>
        <textarea id="input" placeholder="Escribe o sube un documento..." rows="1"></textarea>
        <button id="send-btn">Enviar</button>
    </div>
</div>

<script type="module" src="firebase-config.js"></script> <script src="particles.js"></script>
<script src="main.js"></script>

</body>
</html>
