<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cut-real AI</title>
    <div class="logo-container">
        <a href="/">
            <img src="Logo.png" alt="Cut-real AI Logo" class="nav-logo">
            <span class="nav-title">Cut-real <span class="red-text">AI</span></span>
        </a>
    </div>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash-screen">
    <div class="splash-content">
        <img src="Logo1.png" alt="Logo" class="splash-logo">
        <h1 class="splash-title">Cut-real <span class="red-text">AI</span></h1>
    </div>
</div>

<div id="particles"></div>

<div id="login-overlay">
    <div class="auth-card">
        <h2>Cut-real AI</h2>
        <p>Inicia sesión para sincronizar tus chats en la nube</p>
        <button onclick="login()" class="google-btn">
            <img src="google.png" alt="Google">
            Entrar con Google
        </button>
    </div>
</div>

<button id="logout-btn" onclick="logout()" style="display:none;">Cerrar Sesión</button>

<h1>Cut-real AI</h1>

<div id="chat">
    <div class="ai">Hola, soy Cut-real AI.</div>
</div>

<div class="input-area">
    <input id="input" placeholder="Escribe..." autocomplete="off">
    <button onclick="sendMessage()">Enviar</button>
    <button onclick="resetChat()">Reset</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCQVU9rcF41NL1j6S30SNEMzF9VxBknNEI",
    authDomain: "cutreal-ai.firebaseapp.com",
    projectId: "cutreal-ai",
    storageBucket: "cutreal-ai.firebasestorage.app",
    messagingSenderId: "79541553692",
    appId: "1:79541553692:web:388068da209f1b4ac9edd9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  window.auth = auth;
  window.db = db;
  window.provider = provider;
  window.signInWithPopup = signInWithPopup;
  window.signOut = signOut;
  window.firestore = { doc, getDoc, setDoc };
</script>

<script src="particles.js"></script>
<script src="main.js"></script>
