<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="Logo1.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cut-real AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>

<div id="splash-screen">
    <img src="Logo1.png" alt="Cut-real AI Splash" class="splash-logo">
</div>

<header class="main-header">
    <a href="#" class="header-logo">
        <img src="Logo1.png" alt="Cut-real AI Logo" class="nav-logo-small">
        <h2 class="nav-title">Cut-real <span class="red-text">AI</span></h2>
    </a>
</header>

<div id="particles"></div>

<div id="login-overlay">
    <div class="auth-card">
        <img src="Logo1.png" alt="Cut-real AI" class="auth-logo-small">
        <h2>Cut-real AI</h2>
        <p>Inicia sesión para sincronizar tus chats en la nube</p>
        <button id="btn-google-login" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Entrar con Google
        </button>
    </div>
</div>

<div class="side-controls">
    <button id="logout-btn" style="display:none;">Cerrar Sesión</button>
    <button id="resetChat" style="display:none;">Borrar Chat</button>
</div>

<div class="ad-banner-top">
    <span>Espacio publicitario</span>
</div>

<div id="chat">
    <div class="ai">Hola, soy Cut-real AI.</div>
</div>

<div id="preview-container" style="display: none; width: 85%; max-width: 1000px; margin: 10px auto; position: relative; z-index: 10;">
    <img id="image-preview" src="" style="max-height: 100px; border-radius: 10px; border: 2px solid var(--primary-red);">
    <button onclick="clearFile()" style="background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; position: absolute; top: -5px; left: 85px;">×</button>
</div>

<div class="input-area">
    <input type="file" id="file-input" accept="application/pdf,image/*" style="display: none;">
    <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Adjuntar PDF o Imagen">📎</button>
    
    <textarea id="input" placeholder="Escribe o pide una imagen..." autocomplete="off" rows="1"></textarea>
    <button id="send-btn">Enviar</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCQVU9rcF41NL1j6S30SNEMzF9VxBknNEI",
    authDomain: "cutreal-ai.firebaseapp.com",
    projectId: "cutreal-ai",
    storageBucket: "cutreal-ai.firebasestorage.app",
    messagingSenderId: "79541553692",
    appId: "1:79541553692:web:388068da209f1b4ac9edd9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // Exponer a global para main.js
  window.auth = auth;
  window.db = db;
  window.provider = provider;
  window.signInWithPopup = signInWithPopup;
  window.signOut = signOut;
  window.firestore = { doc, getDoc, setDoc };
</script>

<script src="particles.js"></script>
<script src="main.js"></script>

<footer class="copyright">
    <p>Cut-real AI no es un ser humano. Puede cometer errores, así que verifica las respuestas.</p>
    <p>&copy; 2026 Cut-real AI | TODOS LOS DERECHOS RESERVADOS</p>
</footer>

</body>
</html>
